web.ILLEGAL_TRANSLIT_ID.problem=Translit IDを確認してください。
web.ILLEGAL_TRANSLIT_ID.solution=Translit ID `{0}` が見つかりません。
web.RESPONSE_TYPE_MISMATCH.problem=このミドルウェアはHttpResponse型だけ受付可能です。
web.RESPONSE_TYPE_MISMATCH.solution=後続のミドルウェアは、HttpResponse型を返すように修正してください。
web.ILLEGAL_FRAME_OPTIONS.problem=X-Frame-Optionは、ALLOW-FROMだけが許可されています。
web.ILLEGAL_FRAME_OPTIONS.solution=ALLOW-FRAMEオプションだけを指定するようにしてください。
web.DIGEST_ALGORITHM_UNSUPPORTED.problem=サポートされていないダイジェストアルゴリズムです: {0}
web.DIGEST_ALGORITHM_UNSUPPORTED.solution=sha-256 または sha-512 を使用してください。
web.SIGNATURE_STATUS_REQUIRES_RESPONSE.problem=@statusコンポーネントはレスポンスコンテキストを必要とします。
web.SIGNATURE_STATUS_REQUIRES_RESPONSE.solution=@statusはレスポンスへの署名・検証時のみ使用できます。署名/検証メソッドにnull以外のHttpResponseを渡してください。
web.SIGNATURE_QUERY_PARAM_NAME_REQUIRED.problem=@query-paramコンポーネントには;nameパラメータが必要です。
web.SIGNATURE_QUERY_PARAM_NAME_REQUIRED.solution=;name=<パラメータ名>でクエリパラメータ名を指定してください。例: SignatureComponent.of("@query-param;name=id")
