web.RESPONSE_TYPE_MISMATCH.problem=This middleware accepts HttpResponse only.
web.RESPONSE_TYPE_MISMATCH.solution=Returns HttpResponse
web.ILLEGAL_FRAME_OPTIONS.problem=X-Frame-Option is allowed `ALLOW-FROM`.
web.ILLEGAL_FRAME_OPTIONS.solution=Fixes to set ALLOW-FRAME option only.
web.ILLEGAL_TRANSLIT_ID.problem=Check the Translit ID.
web.ILLEGAL_TRANSLIT_ID.solution=Translit ID `{0}` is not found.
web.APPLICATION_NOT_WEB.problem=The application is not a WebApplication.
web.APPLICATION_NOT_WEB.solution=Use WebApplication as the application factory.
web.SSL_KEYSTORE_REQUIRED.problem=A KeyStore is required for SSL configuration.
web.SSL_KEYSTORE_REQUIRED.solution=Set a KeyStore via setKeystore() or setKeystoreFile() on the server component.
web.INVALID_CLIENT_AUTH.problem=Invalid clientAuth value: {0}.
web.INVALID_CLIENT_AUTH.solution=Use one of: none, want, need.
web.NESTING_TOO_DEEP.problem=Parameter nesting exceeds the maximum depth of {0}.
web.NESTING_TOO_DEEP.solution=Reduce the nesting level of your request parameters.
web.MULTIPART_TOO_LARGE.problem=Multipart request body exceeds the maximum size of {0} bytes.
web.MULTIPART_TOO_LARGE.solution=Reduce the upload size or increase maxTotalSize on MultipartParamsMiddleware.
web.MULTIPART_PART_TOO_LARGE.problem=Multipart part exceeds the maximum size of {0} bytes.
web.MULTIPART_PART_TOO_LARGE.solution=Reduce the part size or increase maxFileSize / maxFormFieldSize on MultipartParamsMiddleware.
web.DIGEST_ALGORITHM_UNSUPPORTED.problem=Unsupported digest algorithm: {0}.
web.DIGEST_ALGORITHM_UNSUPPORTED.solution=Use sha-256 or sha-512.
web.SIGNATURE_STATUS_REQUIRES_RESPONSE.problem=The @status derived component requires a response context.
web.SIGNATURE_STATUS_REQUIRES_RESPONSE.solution=Use @status only when signing or verifying a response. Pass a non-null HttpResponse to the signing/verification method.
web.SIGNATURE_QUERY_PARAM_NAME_REQUIRED.problem=The @query-param component requires a ;name parameter.
web.SIGNATURE_QUERY_PARAM_NAME_REQUIRED.solution=Specify the query parameter name via SfParameters, e.g. new SignatureComponent("@query-param", new SfParameters(Map.of("name", new SfValue.SfString("id")))).
