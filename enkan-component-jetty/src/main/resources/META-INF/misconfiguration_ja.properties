web.WEBSOCKET_MUST_REGISTER_BEFORE_START.problem=WebSocketハンドラ（パス: {0}）がサーバー起動後に登録されました。
web.WEBSOCKET_MUST_REGISTER_BEFORE_START.solution=addWebSocket() は JettyComponent の起動前に呼び出してください。
web.WEBSOCKET_PATH_REQUIRED.problem=WebSocket のパスに null または空文字は指定できません。
web.WEBSOCKET_PATH_REQUIRED.solution=addWebSocket() の呼び出し時に空でないパス文字列を指定してください。
web.WEBSOCKET_HANDLER_REQUIRED.problem=WebSocket ハンドラに null は指定できません（パス: {0}）。
web.WEBSOCKET_HANDLER_REQUIRED.solution=addWebSocket() の呼び出し時に null でない WebSocketHandler を指定してください。
web.DIGEST_ALGORITHM_UNSUPPORTED.problem=サポートされていないダイジェストアルゴリズムです: {0}
web.DIGEST_ALGORITHM_UNSUPPORTED.solution=sha-256 または sha-512 を使用してください。
