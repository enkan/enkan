web.WEBSOCKET_MUST_REGISTER_BEFORE_START.problem=WebSocket handler for path {0} was registered after the server has already started.
web.WEBSOCKET_MUST_REGISTER_BEFORE_START.solution=Call addWebSocket() before starting the JettyComponent.
web.WEBSOCKET_PATH_REQUIRED.problem=WebSocket path must not be null or blank.
web.WEBSOCKET_PATH_REQUIRED.solution=Provide a non-blank path string when calling addWebSocket().
web.WEBSOCKET_HANDLER_REQUIRED.problem=WebSocket handler must not be null (path: {0}).
web.WEBSOCKET_HANDLER_REQUIRED.solution=Provide a non-null WebSocketHandler when calling addWebSocket().
